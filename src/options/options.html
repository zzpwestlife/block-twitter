<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>block-twitter Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>block-twitter Settings</h1>
        </header>

        <main class="content">
            <!-- General Settings Section -->
            <section class="section general-section">
                <div class="section-header">
                    <h2>General</h2>
                </div>
                <div class="general-settings">
                    <label class="toggle-row">
                        <span class="toggle-label-text">在每条帖子旁显示手动标记按钮（🚩）</span>
                        <input type="checkbox" id="showManualClassifyBtn" class="toggle-checkbox">
                    </label>
                </div>
            </section>

            <!-- Keywords Management Section -->
            <section class="section keywords-section">
                <div class="section-header">
                    <h2>Keywords Management</h2>
                    <p class="counter">Keywords: <span id="keywordCount">0</span> / 1000</p>
                </div>

                <div class="keywords-tools">
                    <div class="input-group">
                        <input
                            type="text"
                            id="keywordInput"
                            class="input-field"
                            placeholder="Enter a keyword..."
                            maxlength="100"
                        >
                        <button id="addKeywordBtn" class="btn btn-primary">Add</button>
                    </div>

                    <input
                        type="text"
                        id="keywordFilter"
                        class="input-field"
                        placeholder="Search keywords..."
                    >

                    <div class="button-group">
                        <button id="exportBtn" class="btn btn-secondary">Export Keywords</button>
                        <label class="btn btn-secondary import-label">
                            Import Keywords
                            <input type="file" id="importFile" accept=".json" style="display: none;">
                        </label>
                    </div>

                    <div class="input-group url-import-group">
                        <input
                            type="url"
                            id="urlImportInput"
                            class="input-field"
                            placeholder="Paste URL to import keywords (GitHub Gist, JSON, plain text)..."
                        >
                        <button id="urlImportBtn" class="btn btn-secondary">Import from URL</button>
                    </div>
                </div>

                <div id="keywordsList" class="keywords-list">
                    <!-- Keywords will be populated here -->
                </div>
            </section>

            <!-- AI Detection Settings Section -->
            <section class="section ai-section">
                <div class="section-header">
                    <h2>AI 智能识别</h2>
                    <p class="counter" id="aiStatusBadge">检测中...</p>
                </div>

                <div class="ai-settings">
                    <div class="ai-presets">
                        <span class="ai-presets-label">快速填入：</span>
                        <button class="btn btn-secondary btn-small" id="presetOpenAI">OpenAI</button>
                        <button class="btn btn-secondary btn-small" id="presetClaude">Claude</button>
                    </div>

                    <div class="ai-field">
                        <label class="ai-field-label" for="aiBaseUrl">Base URL</label>
                        <input
                            type="url"
                            id="aiBaseUrl"
                            class="input-field"
                            placeholder="https://api.openai.com/v1"
                        >
                    </div>

                    <div class="ai-field">
                        <label class="ai-field-label" for="aiApiKey">API Key</label>
                        <input
                            type="password"
                            id="aiApiKey"
                            class="input-field"
                            placeholder="sk-..."
                            autocomplete="off"
                        >
                    </div>

                    <div class="ai-field">
                        <label class="ai-field-label" for="aiModel">Model</label>
                        <input
                            type="text"
                            id="aiModel"
                            class="input-field"
                            placeholder="gpt-4o-mini"
                        >
                    </div>

                    <div class="button-group">
                        <button id="testAiBtn" class="btn btn-secondary">测试连接</button>
                        <button id="saveAiBtn" class="btn btn-primary">保存 AI 设置</button>
                    </div>

                    <details class="ai-advanced">
                        <summary>自定义提示词（高级）</summary>
                        <textarea
                            id="aiCustomPrompt"
                            class="input-field ai-prompt-textarea"
                            placeholder="留空使用内置默认提示词..."
                            rows="6"
                        ></textarea>
                        <button id="saveAiPromptBtn" class="btn btn-secondary btn-small">保存提示词</button>
                    </details>
                </div>
            </section>

            <!-- Hidden Users Section -->
            <section class="section blocked-users-section">
                <div class="section-header">
                    <h2>Hidden Users</h2>
                    <p class="counter">Hidden users: <span id="blockedUserCount">0</span></p>
                </div>

                <div class="blocked-users-tools">
                    <input
                        type="text"
                        id="userFilter"
                        class="input-field"
                        placeholder="Search hidden users..."
                    >

                    <button id="clearAllBtn" class="btn btn-danger">Clear All</button>

                    <!-- Batch true-block (X native block) UI -->
                    <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
                        <button id="batchSelectAllHiddenBtn" class="btn btn-secondary">全选</button>
                        <span class="counter">已选 <span id="batchSelectedHiddenCount">0</span></span>
                        <button id="batchTrueBlockBtn" class="btn btn-danger">批量屏蔽（X）</button>
                        <button id="batchCancelTrueBlockBtn" class="btn btn-secondary" style="display:none;">停止</button>
                    </div>
                </div>

                <div id="batchTrueBlockProgress" class="batch-progress" style="display:none;"></div>

                <div id="blockedUsersList" class="blocked-users-list">
                    <!-- Hidden users will be populated here -->
                </div>
            </section>

            <!-- AI Spam Users Section -->
            <section class="section ai-spam-users-section">
                <div class="section-header">
                    <h2>AI 识别的垃圾用户</h2>
                    <p class="counter">Count: <span id="aiSpamUserCount">0</span></p>
                </div>

                <div class="blocked-users-tools">
                    <input
                        type="text"
                        id="aiSpamUserFilter"
                        class="input-field"
                        placeholder="Search AI spam users..."
                    >
                    <button id="clearAllAISpamUsersBtn" class="btn btn-danger">Clear All</button>
                </div>

                <div id="aiSpamUsersList" class="blocked-users-list">
                    <!-- AI spam users will be populated here -->
                </div>
            </section>

            <!-- False Positive Users Section -->
            <section class="section false-positive-users-section">
                <div class="section-header">
                    <h2>误报列表</h2>
                    <p class="counter">Count: <span id="falsePositiveUserCount">0</span></p>
                </div>

                <div class="blocked-users-tools">
                    <input
                        type="text"
                        id="falsePositiveUserFilter"
                        class="input-field"
                        placeholder="Search false positives..."
                    >
                    <button id="clearAllFalsePositiveUsersBtn" class="btn btn-danger">Clear All</button>
                </div>

                <div id="falsePositiveUsersList" class="blocked-users-list">
                    <!-- False positive users will be populated here -->
                </div>
            </section>
        </main>

        <!-- Toast notification -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="options.js"></script>
</body>
</html>
